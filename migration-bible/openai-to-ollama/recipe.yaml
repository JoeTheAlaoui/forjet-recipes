id: openai-to-ollama
name: "Kill Your API Key: OpenAI to Local LLM (Ollama)"
version: "1.0.0"
description: >
  Migrates your AI layer from OpenAI's cloud API to a self-hosted Ollama instance.
  Your data never leaves your infrastructure. No per-token bill. Full GDPR/HIPAA compliance.
  This recipe:
  - Replaces OpenAI client initialization with Ollama client setup
  - Rewrites chat completion API calls to Ollama's /api/chat endpoint
  - Converts embedding API calls to Ollama's /api/embeddings endpoint
  - Migrates streaming response handlers to Ollama's stream format
  - Adds docker-compose service definition for Ollama with GPU passthrough config
  - Converts model names (gpt-4 → llama3.2, text-embedding-ada-002 → nomic-embed-text)
  Activates when the bundle includes a backend with an OpenAI dependency.

badges:
  - "[Verified for Production]"
  - "[AST Precision: 100%]"
  - "[Security Audited by Forjet Guard]"
  - "[GDPR Compliant]"

trigger:
  required_roles:
    - backend
  overrides:
    llm_provider: ollama

transformations:
  # 1. Python: openai.OpenAI() → ollama client
  - target_file: src/llm/client.py
    engine: python_ast
    from_module: openai
    from_name: OpenAI
    to_name: OllamaClient

  # 2. Python: chat completions API → Ollama format
  - target_file: src/llm/chat.py
    engine: python_ast
    from_module: openai
    from_name: ChatCompletion
    to_name: OllamaChat

  # 3. TypeScript: openai npm package → ollama npm package
  - target_file: src/lib/ai.ts
    engine: jscodeshift
    codemod: openai_to_ollama_client

  # 4. TypeScript: stream handler rewrite
  - target_file: src/lib/stream.ts
    engine: jscodeshift
    codemod: openai_stream_to_ollama_stream

  # 5. Add Ollama service to docker-compose.yml
  - target_file: docker-compose.yml
    engine: jscodeshift
    codemod: inject_ollama_service

  # 6. Model name mapping (gpt-4 → llama3.2 etc.)
  - target_file: src/config/models.ts
    engine: jscodeshift
    codemod: openai_model_names_to_ollama

contract_mutations:
  - action: remove_env
    var: OPENAI_API_KEY
    component_role: backend
  - action: remove_env
    var: OPENAI_ORG_ID
    component_role: backend
  - action: add_env
    var: OLLAMA_BASE_URL
    component_role: backend
  - action: add_env
    var: OLLAMA_MODEL
    component_role: backend
  - action: add_env
    var: OLLAMA_EMBEDDING_MODEL
    component_role: backend
