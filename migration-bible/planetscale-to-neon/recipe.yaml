id: planetscale-to-neon
name: "PlanetScale Killed the Free Tier. Neon Didn't."
version: "1.0.0"
description: >
  Migrates your database layer from PlanetScale to Neon (serverless Postgres).
  PlanetScale removed its free tier in April 2024, stranding thousands of developers.
  Neon offers a permanent free tier with serverless branching and 0.5GB storage.
  This recipe:
  - Replaces PlanetScale's Vitess-flavored MySQL dialect with standard Postgres SQL
  - Converts @planetscale/database client to @neondatabase/serverless client
  - Rewrites MySQL-specific syntax (TINYINT(1), unsigned, etc.) to Postgres equivalents
  - Migrates PlanetScale database branches to Neon branch concept
  - Updates Drizzle/Prisma connection strings to Neon serverless format
  Activates when the bundle includes a backend with a PlanetScale dependency.

badges:
  - "[Verified for Production]"
  - "[AST Precision: 100%]"
  - "[Security Audited by Forjet Guard]"

trigger:
  required_roles:
    - backend
  overrides:
    database: neon

transformations:
  # 1. TypeScript: @planetscale/database → @neondatabase/serverless
  - target_file: src/lib/db.ts
    engine: jscodeshift
    codemod: planetscale_to_neon_client

  # 2. Drizzle config: mysql2 dialect → postgres dialect
  - target_file: drizzle.config.ts
    engine: jscodeshift
    codemod: drizzle_mysql_to_postgres

  # 3. Schema: MySQL types → Postgres types
  - target_file: src/db/schema.ts
    engine: jscodeshift
    codemod: mysql_schema_to_postgres

  # 4. Prisma: mysql provider → postgresql provider
  - target_file: prisma/schema.prisma
    engine: jscodeshift
    codemod: prisma_mysql_to_postgres

  # 5. Edge runtime: fetch-based PlanetScale → Neon HTTP driver
  - target_file: src/lib/edge-db.ts
    engine: jscodeshift
    codemod: planetscale_edge_to_neon_http

contract_mutations:
  - action: remove_env
    var: DATABASE_HOST
    component_role: backend
  - action: remove_env
    var: DATABASE_USERNAME
    component_role: backend
  - action: remove_env
    var: DATABASE_PASSWORD
    component_role: backend
  - action: add_env
    var: DATABASE_URL
    component_role: backend
  - action: add_env
    var: DATABASE_URL_UNPOOLED
    component_role: backend
