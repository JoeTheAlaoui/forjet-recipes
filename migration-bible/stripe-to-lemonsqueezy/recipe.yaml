id: stripe-to-lemonsqueezy
name: "Stop Filing Taxes in 47 Countries: Stripe to LemonSqueezy"
version: "1.0.0"
description: >
  Migrates payment processing from Stripe to LemonSqueezy (Merchant of Record).
  If you sell globally without a US entity, Stripe forces you to handle VAT,
  GST, and sales tax compliance yourself. LemonSqueezy handles all of it automatically
  as your Merchant of Record. This recipe:
  - Replaces Stripe client initialization with LemonSqueezy client
  - Rewrites checkout session creation to LemonSqueezy checkout links
  - Converts Stripe webhook handlers to LemonSqueezy webhook events
  - Migrates subscription management calls to LemonSqueezy subscriptions API
  - Updates customer portal links to LemonSqueezy portal
  Activates when the bundle includes a backend with Stripe dependency.

badges:
  - "[Verified for Production]"
  - "[AST Precision: 100%]"
  - "[Security Audited by Forjet Guard]"
  - "[MoR Tax Compliant: 47 Countries]"

trigger:
  required_roles:
    - backend
  overrides:
    payment_provider: lemonsqueezy

transformations:
  # 1. Stripe client → LemonSqueezy client initialization
  - target_file: src/lib/payments.ts
    engine: jscodeshift
    codemod: stripe_to_lemonsqueezy_client

  # 2. Checkout session → LemonSqueezy checkout URL
  - target_file: src/app/api/checkout/route.ts
    engine: jscodeshift
    codemod: stripe_checkout_to_lemonsqueezy

  # 3. Webhook handler: stripe events → lemonsqueezy events
  - target_file: src/app/api/webhooks/stripe/route.ts
    engine: jscodeshift
    codemod: stripe_webhook_to_lemonsqueezy

  # 4. Subscription management: Stripe.subscription → LS subscription
  - target_file: src/lib/subscriptions.ts
    engine: jscodeshift
    codemod: stripe_subscriptions_to_lemonsqueezy

  # 5. Customer portal links
  - target_file: src/app/api/portal/route.ts
    engine: jscodeshift
    codemod: stripe_portal_to_lemonsqueezy

contract_mutations:
  - action: remove_env
    var: STRIPE_SECRET_KEY
    component_role: backend
  - action: remove_env
    var: STRIPE_PUBLISHABLE_KEY
    component_role: backend
  - action: remove_env
    var: STRIPE_WEBHOOK_SECRET
    component_role: backend
  - action: add_env
    var: LEMONSQUEEZY_API_KEY
    component_role: backend
  - action: add_env
    var: LEMONSQUEEZY_WEBHOOK_SECRET
    component_role: backend
  - action: add_env
    var: LEMONSQUEEZY_STORE_ID
    component_role: backend
  - action: add_env
    var: NEXT_PUBLIC_LEMONSQUEEZY_STORE_URL
    component_role: backend
