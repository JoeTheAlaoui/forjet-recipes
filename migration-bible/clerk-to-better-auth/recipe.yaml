id: clerk-to-better-auth
name: "Stop Paying Per-User Auth Fees: Clerk to Better Auth"
version: "1.0.0"
description: >
  Escapes Clerk's per-MAU pricing model ($0.02/user/mo after 10k users) by migrating
  to Better Auth — a fully self-hosted, open-source TypeScript auth library.
  At scale, this can save hundreds to thousands per month with zero lock-in.
  This recipe:
  - Replaces Clerk middleware with Better Auth session middleware
  - Rewrites useUser(), useAuth(), currentUser() hooks to Better Auth equivalents
  - Converts ClerkProvider wrapper to Better Auth session provider
  - Migrates Clerk webhook handlers to Better Auth event system
  - Rewrites protected route patterns to Better Auth session checks
  Activates when the bundle includes a frontend/backend with Clerk dependency.

badges:
  - "[Verified for Production]"
  - "[AST Precision: 100%]"
  - "[Security Audited by Forjet Guard]"

trigger:
  required_roles:
    - frontend
  overrides:
    auth_provider: better-auth

transformations:
  # 1. Next.js middleware: clerkMiddleware → better-auth session check
  - target_file: src/middleware.ts
    engine: jscodeshift
    codemod: clerk_middleware_to_better_auth

  # 2. Layout: ClerkProvider → BetterAuthProvider
  - target_file: src/app/layout.tsx
    engine: jscodeshift
    codemod: clerk_provider_to_better_auth_provider

  # 3. React hooks: useUser/useAuth → useBetterAuth session
  - target_file: src/hooks/useAuth.ts
    engine: jscodeshift
    codemod: clerk_hooks_to_better_auth

  # 4. Server-side: auth() / currentUser() → better-auth getSession()
  - target_file: src/app/api/auth/route.ts
    engine: jscodeshift
    codemod: clerk_server_auth_to_better_auth

  # 5. Sign-in/Sign-up pages: Clerk components → Better Auth forms
  - target_file: src/app/(auth)/sign-in/page.tsx
    engine: jscodeshift
    codemod: clerk_signin_to_better_auth_form

  # 6. Protected API routes: auth().userId → better-auth session checks
  - target_file: src/app/api
    engine: jscodeshift
    codemod: clerk_api_protection_to_better_auth

contract_mutations:
  - action: remove_env
    var: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    component_role: frontend
  - action: remove_env
    var: CLERK_SECRET_KEY
    component_role: frontend
  - action: remove_env
    var: NEXT_PUBLIC_CLERK_SIGN_IN_URL
    component_role: frontend
  - action: remove_env
    var: NEXT_PUBLIC_CLERK_SIGN_UP_URL
    component_role: frontend
  - action: add_env
    var: BETTER_AUTH_SECRET
    component_role: frontend
  - action: add_env
    var: BETTER_AUTH_URL
    component_role: frontend
  - action: add_env
    var: DATABASE_URL
    component_role: frontend
